#cloud-config
# kubeadm worker installation userdata

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - containerd
  - containernetworking-plugins
  - curl
  - gpg
  - jq

write_files:
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    permissions: '0644'
  - path: /etc/sysctl.d/99-kubernetes-cri.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    permissions: '0644'

runcmd:
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl --system
  - swapoff -a
  - sed -ri '/\sswap\s/s/^#?/#/' /etc/fstab
  - mkdir -p /etc/containerd
  - |
    containerd config default > /etc/containerd/config.toml
    sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
  - systemctl enable --now containerd
  - mkdir -p /etc/apt/keyrings
  - |
    K8S_MINOR_VERSION="{{K8S_MINOR_VERSION}}"
    curl -fsSL "https://pkgs.k8s.io/core:/stable:/v${K8S_MINOR_VERSION}/deb/Release.key" | \
      gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v${K8S_MINOR_VERSION}/deb/ /" \
      > /etc/apt/sources.list.d/kubernetes.list
    apt-get update
  - |
    K8S_VERSION="{{K8S_VERSION}}"
    KUBEADM_PKG_VERSION=$(apt-cache madison kubeadm | awk -v version="$K8S_VERSION" 'index($3, version) { print $3; exit }')
    KUBELET_PKG_VERSION=$(apt-cache madison kubelet | awk -v version="$K8S_VERSION" 'index($3, version) { print $3; exit }')
    KUBECTL_PKG_VERSION=$(apt-cache madison kubectl | awk -v version="$K8S_VERSION" 'index($3, version) { print $3; exit }')
    if [ -z "$KUBEADM_PKG_VERSION" ] || [ -z "$KUBELET_PKG_VERSION" ] || [ -z "$KUBECTL_PKG_VERSION" ]; then
      echo "Failed to resolve Kubernetes package versions for $K8S_VERSION"
      exit 1
    fi
    apt-get install -y kubeadm="$KUBEADM_PKG_VERSION" kubelet="$KUBELET_PKG_VERSION" kubectl="$KUBECTL_PKG_VERSION"
    apt-mark hold kubeadm kubelet kubectl
  - systemctl enable kubelet
  - |
    INTERNAL_IP=$(ip -4 -o addr show scope global | awk '{print $4}' | cut -d/ -f1 | grep -E '^10\.|^172\.(1[6-9]|2[0-9]|3[01])\.|^192\.168\.' | head -n1)
    echo "Detected internal IP: $INTERNAL_IP"
    cat > /root/kubeadm-join.yaml << EOF
    apiVersion: kubeadm.k8s.io/v1beta4
    kind: JoinConfiguration
    discovery:
      bootstrapToken:
        apiServerEndpoint: "{{CONTROL_PLANE_ENDPOINT}}:6443"
        token: "{{KUBEADM_TOKEN}}"
        caCertHashes:
          - "{{DISCOVERY_TOKEN_CA_CERT_HASH}}"
    nodeRegistration:
      name: $(hostname)
      kubeletExtraArgs:
        - name: cloud-provider
          value: external
        - name: node-ip
          value: ${INTERNAL_IP}
    EOF
    kubeadm join --config /root/kubeadm-join.yaml
  - touch /var/log/kubeadm-ready

final_message: "kubeadm worker installation completed!"
